spring:
  datasource:
    url: jdbc:mysql://localhost:3306/taskflow
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

server:
  port: 8080